name:       geomancy
version:    0.3.0.0
git:        "https://gitlab.com/dpwiz/geomancy"
license:    BSD3
author:     "IC Rainbow"
maintainer: "aenor.realm@gmail.com"
copyright:  "2021-2025 IC Rainbow"

extra-source-files:
- README.md
- ChangeLog.md

synopsis: Vectors and matrix manipulation
category: Graphics

description: |
  Sometimes it is unavoidable you have to do stuff on CPU.
  Let's at least do it faster.

dependencies:
- base >= 4.7 && < 5
- deepseq
- simple-affine-space

ghc-options:
- -Wall

library:
  c-sources: cbits/mat4.c
  source-dirs: src
  dependencies:
  - containers
  - gl-block
  - mono-traversable
  - ptrdiff

tests:
  geomancy-test:
    main: Spec.hs
    source-dirs: test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -with-rtsopts=-qn1
    - -with-rtsopts=-A128m
    # - -with-rtsopts=-s
    dependencies:
    - geomancy
    - linear
    - hedgehog

benchmarks:
  geomancy-bench:
    main: Main.hs
    source-dirs: bench
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -with-rtsopts=-qn1
    - -with-rtsopts=-A16m
    dependencies:
    - geomancy
    - linear
    - criterion
